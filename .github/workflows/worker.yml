on:
  schedule:
    - cron: "*/5 * * * *" # daily at midnight UTC
  workflow_dispatch: # manual trigger if needed
jobs:
  run-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install

      - name: Run background worker
        run: node index.mjs
